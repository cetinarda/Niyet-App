<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- gökyüzü -->
  <rect x="4" y="3" width="24" height="26" rx="1" fill="#7dd8e8"/>
  <!-- deniz -->
  <rect x="4" y="16" width="24" height="13" rx="0" fill="#1ab8b0"/>
  <!-- deniz alt tonu -->
  <rect x="4" y="22" width="24" height="7" fill="#0e9e96"/>
  <!-- ufuk çizgisi -->
  <rect x="4" y="15.5" width="24" height="1.2" fill="#5ecfca" opacity="0.6"/>
  <!-- bulutlar -->
  <ellipse cx="11" cy="9" rx="3.5" ry="1.4" fill="white" opacity="0.75"/>
  <ellipse cx="20" cy="8" rx="2.8" ry="1.1" fill="white" opacity="0.6"/>
  <!-- bitki örtüsü (alt köşe) -->
  <ellipse cx="8"  cy="29" rx="4" ry="2.5" fill="#5a7a30" opacity="0.8"/>
  <ellipse cx="24" cy="29" rx="3" ry="2" fill="#5a7a30" opacity="0.6"/>
  <!-- pencere sol kanat -->
  <rect x="2" y="2" width="5" height="28" rx="1" fill="#2a2220"/>
  <rect x="3.5" y="2" width="1.2" height="28" fill="#3a3230" opacity="0.5"/>
  <!-- pencere sağ kanat -->
  <rect x="25" y="2" width="5" height="28" rx="1" fill="#2a2220"/>
  <rect x="27.3" y="2" width="1.2" height="28" fill="#3a3230" opacity="0.5"/>
  <!-- yatay çerçeve çubuğu - sol -->
  <rect x="2" y="14" width="5" height="1.2" fill="#1e1c1a"/>
  <!-- yatay çerçeve çubuğu - sağ -->
  <rect x="25" y="14" width="5" height="1.2" fill="#1e1c1a"/>
  <!-- üst çerçeve -->
  <rect x="2" y="2" width="28" height="2.5" rx="1" fill="#2a2220"/>
  <!-- alt çerçeve -->
  <rect x="2" y="27.5" width="28" height="2.5" rx="1" fill="#2a2220"/>
  <!-- iç çerçeve kenar yumuşatma - sol ışık yansıması -->
  <rect x="6.8" y="2" width="0.6" height="28" fill="rgba(255,255,255,0.06)"/>
  <!-- iç çerçeve kenar - sağ ışık yansıması -->
  <rect x="24.6" y="2" width="0.6" height="28" fill="rgba(255,255,255,0.06)"/>
</svg>
