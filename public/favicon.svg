<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0e1220"/>
      <stop offset="100%" stop-color="#060a12"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <rect x="7" y="7" width="18" height="18" rx="1.5"
        fill="none" stroke="rgba(184,164,216,0.28)" stroke-width="0.5"
        transform="rotate(45 16 16)"/>
  <circle cx="16" cy="16" r="7.5" fill="none" stroke="rgba(184,164,216,0.06)" stroke-width="0.3"/>
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="rgba(184,164,216,0.08)" stroke-width="0.3"/>
  <circle cx="16" cy="16" r="4" fill="rgba(122,80,150,0.2)"/>
  <circle cx="16" cy="16" r="1.8" fill="rgba(200,185,225,0.9)" filter="url(#glow)"/>
</svg>
