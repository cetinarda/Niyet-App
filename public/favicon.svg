<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- pencere çerçevesi -->
  <rect x="3" y="5" width="26" height="22" rx="3" ry="3"
        stroke="rgba(200,185,240,0.85)" stroke-width="1.6" fill="rgba(140,110,200,0.08)"/>
  <!-- başlık çubuğu -->
  <line x1="3" y1="11" x2="29" y2="11" stroke="rgba(200,185,240,0.5)" stroke-width="1.2"/>
  <!-- trafik noktaları -->
  <circle cx="7.5"  cy="8" r="1.1" fill="rgba(200,185,240,0.5)"/>
  <circle cx="11"   cy="8" r="1.1" fill="rgba(200,185,240,0.35)"/>
  <circle cx="14.5" cy="8" r="1.1" fill="rgba(200,185,240,0.2)"/>
  <!-- içerik satırları -->
  <line x1="8" y1="16" x2="24" y2="16" stroke="rgba(180,165,220,0.3)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="20" x2="20" y2="20" stroke="rgba(180,165,220,0.2)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="24" x2="16" y2="24" stroke="rgba(180,165,220,0.15)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
