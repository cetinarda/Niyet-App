[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."ai-call"]
  timeout = 26

[functions."ai-report"]
  timeout = 26

[[headers]]
  for = "/privacy/*"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/terms/*"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
