[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."ai-call"]
  timeout = 26

[functions."ai-report"]
  timeout = 26

[[headers]]
  for = "/privacy/*"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/terms/*"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = ""
    Content-Security-Policy = "frame-ancestors 'self' https://kozmikgemi.netlify.app https://kozmikgemi.com https://www.kozmikgemi.com https://*.kozmikgemi.com https://*.netlify.app;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
